# Docker Compose for GraminRozgar (Unified Deployment)
# Runs the combined Backend + Frontend container configured for production via Nginx
# Run with: docker-compose up -d --build

version: '3.8'

services:
  # GraminRozgar App (Frontend + Backend + Nginx)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: /api
    container_name: graminrozgar-app
    restart: unless-stopped
    ports:
      # Expose on port 8080 to map to domain name
      - "8080:8080"
    environment:
      # Hardcode your MongoDB Atlas connection string here
      - MONGO_URL=mongodb+srv://<username>:<password>@<cluster>.mongodb.net/graminrozgar?retryWrites=true&w=majority
      - JWT_SECRET=graminrozgar_secret_key_2025
      - OPENROUTER_API_KEY=your_openrouter_api_key_here
      - SARVAM_API_KEY=your_sarvam_api_key_here
    networks:
      - graminrozgar-network
    healthcheck:
      test: curl -f http://localhost/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  graminrozgar-network:
    driver: bridge
